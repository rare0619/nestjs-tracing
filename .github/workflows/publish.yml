# 自动发布到 npm
#
# 触发条件：代码合并到 main 分支
# 流程：安装依赖 → 编译 → 运行测试 → 发布到 npm
#
# 前置条件：
#   在 GitHub 仓库 Settings → Secrets and variables → Actions 中添加：
#   NPM_TOKEN — npm 的 Automation token（在 npmjs.com → Access Tokens → Generate New Token → Automation 创建）

name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest

    # 只在 package.json 版本号变更时发布（避免非版本提交触发无意义的 publish）
    # 如果想每次 push main 都发布，删掉下面的 if 条件
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Check if version changed
        id: version_check
        run: |
          # 获取 package.json 中的版本号
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          echo "local_version=$LOCAL_VERSION"

          # 查询 npm 上已发布的版本（404 表示从未发布过）
          NPM_VERSION=$(npm view @rare0619/nestjs-tracing version 2>/dev/null || echo "0.0.0")
          echo "npm_version=$NPM_VERSION"

          if [ "$LOCAL_VERSION" = "$NPM_VERSION" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️ Version $LOCAL_VERSION already published, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "🚀 Publishing $LOCAL_VERSION (npm has $NPM_VERSION)"
          fi

      - name: Publish to npm
        if: steps.version_check.outputs.skip != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
