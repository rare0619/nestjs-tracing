# 自动发布到 npm（使用 Trusted Publishers / OIDC）
#
# 触发条件：代码合并到 main 分支
# 流程：安装依赖 → 编译 → 运行测试 → 版本检查 → OIDC 发布到 npm
#
# 前置条件：
#   在 npmjs.com 包设置页 → Settings → Trusted Publisher 中配置：
#     Organization or user: rare0619
#     Repository:            nestjs-tracing
#     Workflow filename:     publish.yml
#     Environment name:      （留空）

name: Publish to npm

on:
  push:
    branches: [main]

permissions:
  id-token: write   # Required for npm OIDC trusted publishing
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Check if version changed
        id: version_check
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          echo "local_version=$LOCAL_VERSION"

          NPM_VERSION=$(npm view @rare0619/nestjs-tracing version 2>/dev/null || echo "0.0.0")
          echo "npm_version=$NPM_VERSION"

          if [ "$LOCAL_VERSION" = "$NPM_VERSION" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️ Version $LOCAL_VERSION already published, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "🚀 Publishing $LOCAL_VERSION (npm has $NPM_VERSION)"
          fi

      - name: Publish to npm (OIDC)
        if: steps.version_check.outputs.skip != 'true'
        run: npm publish --access public
